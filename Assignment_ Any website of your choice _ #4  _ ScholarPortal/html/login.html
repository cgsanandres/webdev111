<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScholarPortal | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* GLOBAL STYLE */
* { box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body { margin:0; display:flex; background:#0f172a; color:#fff; height:100vh; justify-content:center; align-items:center; }

.login-card {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    width: 360px;
    text-align:center;
}

.login-card h2 {
    color:#38bdf8;
    margin-bottom:25px;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #334155;
    background:rgba(255,255,255,0.1);
    color:#fff;
}

input::placeholder { color:#cbd5f5; }

button {
    width:100%;
    padding:12px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover { background:#0ea5e9; }

p { margin-top:15px; }
a { color:#38bdf8; text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form onsubmit="return loginStudent()">
        <input type="text" id="studentID" placeholder="Student ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Create Account</a></p>
</div>

<script>
function loginStudent() {
    const studentID = document.getElementById("studentID").value;
    const password = document.getElementById("password").value;

    const savedID = localStorage.getItem("studentID");
    const savedPassword = localStorage.getItem("studentPassword");

    if(studentID === savedID && password === savedPassword){
        alert("Login successful!");
        window.location.href = "index.html";
        return false;
    } else {
        alert("Invalid Student ID or Password.");
        return false;
    }
}
</script>

</body>
</html>
