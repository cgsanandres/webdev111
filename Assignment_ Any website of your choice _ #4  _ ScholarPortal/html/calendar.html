<!DOCTYPE html>
<html>
<head>
<title>Academic Calendar</title>
<style>
*{box-sizing:border-box; font-family:'Segoe UI',sans-serif;}
body{margin:0; display:flex; background:#0f172a; color:#fff;}

.sidebar{
width:250px;
background:#020617;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{color:#38bdf8; text-align:center;}
.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
margin:12px 0;
padding:10px;
border-radius:8px;
}
.sidebar a:hover{background:#1e293b;}

.main{
margin-left:250px;
padding:25px;
width:100%;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

table {
width: 100%;
border-collapse: collapse;
table-layout: fixed; /* forces alignment */
}

th, td {
padding: 12px;
text-align: left;
}

th:nth-child(1), td:nth-child(1) {
width: 30%; /* Date column */
}

th:nth-child(2), td:nth-child(2) {
width: 70%; /* Event column */
}

}
th{color:#38bdf8;}
</style>
</head>

<body>

<div class="sidebar">
<h2>ScholarPortal</h2>

</div>

<div class="main">

<div class="card">
<h2>📅 Academic Calendar</h2>

<table>
<thead>
<tr>
<th>Date</th>
<th>Event</th>
</tr>
</thead>

<tbody>
<tr>
<td>March 20</td>
<td>Start of Classes</td>
</tr>

<tr>
<td>April 15</td>
<td>Midterms</td>
</tr>

<tr>
<td>June 10</td>
<td>Final Exams</td>
</tr>

<tr>
<td>June 20</td>
<td>End of Semester</td>
</tr>
</tbody>
</table>

</div>

</div>
</body>
</html>
