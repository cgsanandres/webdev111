<!DOCTYPE html>
<html>
<head>
<title>Library</title>
<style>
*{box-sizing:border-box; font-family:'Segoe UI',sans-serif;}
body{margin:0; display:flex; background:#0f172a; color:#fff;}

.sidebar{
width:250px;
background:#020617;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{color:#38bdf8; text-align:center;}
.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
margin:12px 0;
padding:10px;
border-radius:8px;
}
.sidebar a:hover{background:#1e293b;}

.main{
margin-left:250px;
padding:25px;
width:100%;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

table {
width: 100%;
table-layout: fixed; /* locks column alignment */
border-collapse: collapse;
}

th, td {
padding: 12px;
text-align: left;
vertical-align: top;
word-wrap: break-word;
}

/* FORCE COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1){ width: 50%; } /* Title */
th:nth-child(2), td:nth-child(2){ width: 30%; } /* Author */
th:nth-child(3), td:nth-child(3){ width: 20%; } /* Status */

th{color:#38bdf8;}

.search{
width:100%;
padding:10px;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ScholarPortal</h2>
<a href="index.html">Dashboard</a>
<a href="registration.html">Registration</a>
<a href="grades.html">Grades</a>
<a href="profile.html">Profile</a>
<a href="account.html">Account</a>
<a href="section.html">Section Offering</a>
<a href="calendar.html">Academic Calendar</a>
<a href="password.html">Password</a>
<a href="library.html">Library</a>
<a href="messaging.html">Messaging</a>

</div>

<div class="main">

<div class="card">
<h2>📚 Digital Library</h2>

<input type="text" class="search" placeholder="Search books...">

<table>
<tr>
<th>Title</th>
<th>Author</th>
<th>Status</th>
</tr>

<tr>
<td>Web Development Basics</td>
<td>John Doe</td>
<td>Available</td>
</tr>

<tr>
<td>Database Systems</td>
<td>Jane Smith</td>
<td>Borrowed</td>
</tr>

</table>

</div>

</div>
</body>
</html>
