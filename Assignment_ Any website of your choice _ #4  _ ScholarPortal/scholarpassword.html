<!DOCTYPE html>
<html>
<head>
<title>Password Settings</title>
<style>
*{box-sizing:border-box; font-family:'Segoe UI',sans-serif;}
body{margin:0; display:flex; background:#0f172a; color:#fff;}

.sidebar{
width:250px;
background:#020617;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{color:#38bdf8; text-align:center;}
.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
margin:12px 0;
padding:10px;
border-radius:8px;
}
.sidebar a:hover{background:#1e293b;}

.main{
margin-left:250px;
padding:25px;
width:100%;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}
th,td{
padding:12px;
border-bottom:1px solid #334155;
}
th{color:#38bdf8;}

input{width:100%; padding:10px; margin:10px 0;}
button{padding:10px; background:#38bdf8; border:none;}
</style>
</head>

<body>

<div class="sidebar">
<h2>ScholarPortal</h2>
<a href="scholardashboard.html">Dashboard</a>
<a href="scholarregistration.html">Registration</a>
<a href="scholargrades.html">Grades</a>
<a href="scholarprofile.html">Profile</a>
<a href="scholaraccount.html">Account</a>
<a href="scholarsection.html">Section Offering</a>
<a href="scholarcalendar.html">Academic Calendar</a>
<a href="scholarpassword.html">Password</a>
<a href="scholarlibrary.html">Library</a>
<a href="scholarmessaging.html">Messaging</a>


</div>

<div class="main">

<div class="card">
<h2>🔐 Change Password</h2>

<form onsubmit="return changePass()">
<input type="password" id="old" placeholder="Old Password" required>
<input type="password" id="new" placeholder="New Password" required>
<input type="password" id="confirm" placeholder="Confirm Password" required>
<button>Update Password</button>
</form>

</div>

</div>

<script>
function changePass(){
let old=document.getElementById("old").value;
let saved=localStorage.getItem("password");

if(old!==saved){alert("Wrong password"); return false;}

let newp=document.getElementById("new").value;
let confirm=document.getElementById("confirm").value;

if(newp!==confirm){alert("Passwords do not match"); return false;}

localStorage.setItem("password",newp);
alert("Password updated!");
return false;
}
</script>

</body>
</html>
