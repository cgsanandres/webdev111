<!DOCTYPE html>
<html>
<head>
    <title>IronCore Fitness | My Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        :root {
            --primary: #f5c518;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #e63946;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            margin: 0;
            display: flex;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
        }

        /* SIDEBAR (Locked Consistency) */
        .sidebar {
            width: 240px;
            background: #000;
            height: 100vh;
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: fixed;
            border-right: 1px solid #222;
        }

        .sidebar h2 { color: var(--primary); text-align: center; letter-spacing: 2px; margin-bottom: 30px; }

        .sidebar a {
            color: #ddd;
            text-decoration: none;
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar a:hover, .sidebar a.active { background: var(--glass); color: var(--primary); padding-left: 20px; }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            margin-left: 240px;
            padding: 40px;
            max-width: 1200px;
        }

        /* PROFILE HEADER */
        .profile-header {
            background: linear-gradient(135deg, #161616 0%, #000 100%);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .profile-header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
        }

        .profile-info h2 { font-size: 32px; margin: 0; color: var(--primary); }
        .tier-badge {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 11px;
            margin-top: 10px;
        }

        /* STATS GRID */
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--primary); }
        .card i { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        .card h3 { font-size: 14px; color: var(--text-muted); margin: 0; text-transform: uppercase; }
        .card p { font-size: 20px; font-weight: bold; margin: 10px 0 0; }

        /* ACHIEVEMENTS */
        .achievement-list {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .achv {
            width: 45px;
            height: 45px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            border: 1px solid #444;
            cursor: pointer;
        }

        .achv:hover { transform: scale(1.1); background: var(--primary); color: black; }

        /* ACTION BUTTONS */
        .actions { display: flex; gap: 15px; }

        .btn {
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: black; }
        .btn-secondary { background: transparent; border: 1px solid #333; color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    </style>
</head>

<body>

<div class="sidebar">
    <h2>IRONCORE</h2>
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="classes.html"><i class="fas fa-dumbbell"></i> Classes</a>
    <a href="trainers.html"><i class="fas fa-user-tie"></i> Trainers</a>
    <a href="membership.html"><i class="fas fa-credit-card"></i> Membership</a>
    <a href="gallery.html"><i class="fas fa-camera"></i> Gallery</a>
    <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
    <a href="contact.html"><i class="fas fa-phone"></i> Contact</a>
	 <a href="account.html"><i class="fas fa-phone"></i> Account</a>
    <a onclick="logout()" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
    <h1 style="border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 40px;">Account Settings</h1>

    <!-- PROFILE HEADER -->
    <div class="profile-header">
        <img src="https://unsplash.com" alt="Profile">
        <div class="profile-info">
            <h2 id="userEmail">Loading...</h2>
            <div class="tier-badge">PRO MEMBER</div>
            
            <div class="achievement-list">
                <div class="achv" title="7 Day Streak"><i class="fas fa-fire"></i></div>
                <div class="achv" title="Heavy Lifter"><i class="fas fa-weight-hanging"></i></div>
                <div class="achv" title="Early Bird"><i class="fas fa-sun"></i></div>
            </div>
        </div>
    </div>

    <!-- MEMBER STATS -->
    <div class="grid-4">
        <div class="card">
            <i class="fas fa-calendar-check"></i>
            <h3>Member Since</h3>
            <p>April 2024</p>
        </div>
        <div class="card">
            <i class="fas fa-id-card"></i>
            <h3>Status</h3>
            <p style="color: #4BB543;">Active</p>
        </div>
        <div class="card">
            <i class="fas fa-bolt"></i>
            <h3>Current Plan</h3>
            <p>Strength Elite</p>
        </div>
        <div class="card">
            <i class="fas fa-user-friends"></i>
            <h3>Assigned Coach</h3>
            <p>Sarah J.</p>
        </div>
    </div>

    <!-- QUICK ACTIONS -->
    <h2>Quick Actions</h2>
    <div class="actions">
        <button class="btn btn-primary" onclick="location.href='membership.html'">Manage Subscription</button>
        <button class="btn btn-secondary" onclick="alert('Profile Editor Coming Soon!')">Edit Profile</button>
        <button class="btn btn-secondary" onclick="location.href='booking.html'">Change Trainer</button>
        <button class="btn btn-danger" onclick="logout()">Sign Out</button>
    </div>
</div>

<script>
    /* LOGIN CHECK */
    if(localStorage.getItem("fitnessLoggedIn") !== "true"){
        window.location.href="login.html";
    }

    /* DISPLAY USER DATA */
    const email = localStorage.getItem("fitnessEmail") || "Warrior";
    document.getElementById("userEmail").innerText = email.split('@')[0].toUpperCase();

    /* LOGOUT */
    function logout(){
        localStorage.removeItem("fitnessLoggedIn");
        window.location.href="login.html";
    }
</script>

</body>
</html>
